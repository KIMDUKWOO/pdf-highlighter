<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>PDF 키워드 하이라이터</title>
  <script type="module" src="/src/main.js"></script>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <h1>PDF 키워드 하이라이터</h1>

  <div class="box">
    <label>PDF 파일 선택</label>
    <input type="file" id="pdfFile" accept="application/pdf" />
  </div>

  <div class="box">
    <label>엑셀 파일 선택 (.xlsx)</label>
    <input type="file" id="excelFile" accept=".xlsx" />
  </div>

  <div class="box">
    <label>옵션</label>
    <div>
      <input type="checkbox" id="ignoreCase" checked> 대소문자 무시
    </div>
    <div>
      <input type="checkbox" id="wholeWord"> 단어 단위 매칭
    </div>
    <div>
      B열 색상:
      <select id="bColor">
        <option value="green">연두(기본)</option>
        <option value="blue">하늘색</option>
        <option value="pink">분홍색</option>
        <option value="orange">주황색</option>
        <option value="purple">보라색</option>
      </select>
    </div>
  </div>

  <button id="runBtn" disabled>하이라이트 실행</button>

  <h3>로그</h3>
  <pre id="log"></pre>
</body>
</html>
